<div
    class="min-h-screen bg-[radial-gradient(circle_at_top_left,var(--tw-gradient-stops))] from-slate-900 via-neutral-950 to-black flex items-center justify-center p-6 font-sans">

    <div
        class="w-full max-w-110 bg-white/2 backdrop-blur-xl border border-white/10 rounded-3xl p-10 shadow-2xl overflow-hidden relative">

        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-600/20 blur-[80px] rounded-full"></div>

        <header class="relative mb-8 text-center">
            <div
                class="mb-4 inline-block p-3 bg-linear-to-br from-indigo-500 to-purple-600 rounded-2xl shadow-indigo-500/20 shadow-2xl">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v2a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v2a1 1 0 01-1 1h-3a1 1 0 00-1 1v1a2 2 0 11-4 0v-1a1 1 0 00-1-1H7a1 1 0 01-1-1v-2a1 1 0 011-1h1a2 2 0 100-4H7a1 1 0 01-1-1V7a1 1 0 011-1h3a1 1 0 001-1V4z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">Acceso de Jugador</h2>
            <p class="text-neutral-400 text-sm mt-1">Ingresa a tu cuenta para continuar tu progreso</p>
        </header>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <button
                class="flex items-center justify-center py-2.5 bg-white/3 border border-white/5 rounded-xl hover:bg-white/8 transition-all group">
                <img src="/steam-svgrepo-com.svg" class="w-5 h-5 opacity-70 group-hover:opacity-100" alt="Steam">
            </button>

            <button
                class="flex items-center justify-center py-2.5 bg-white/3 border border-white/5 rounded-xl hover:bg-white/8 transition-all group">
                <img src="/discord-icon-svgrepo-com.svg" class="w-5 h-5 opacity-70 group-hover:opacity-100"
                    alt="Discord">
            </button>

            <button
                class="flex items-center justify-center py-2.5 bg-white/3 border border-white/5 rounded-xl hover:bg-white/8 transition-all group">
                <img src="/epicgames-svgrepo-com.svg" class="w-5 h-5 opacity-70 group-hover:opacity-100" alt="Epic">
            </button>
        </div>

        <div class="flex items-center gap-4 mb-8">
            <div class="h-px flex-1 bg-linear-to-r from-transparent via-white/10 to-white/10"></div>
            <span class="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-bold">O vía Email</span>
            <div class="h-px flex-1 bg-linear-to-l from-transparent via-white/10 to-white/10"></div>
        </div>

        <form class="space-y-6">
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-neutral-400 uppercase tracking-widest ml-1">
                    Correo Electrónico
                </label>
                <div class="relative group">
                    <input type="email" class="w-full bg-indigo-50 border border-white/10 rounded-xl px-4 py-3.5 text-black 
                               placeholder:text-white/30 focus:outline-none focus:ring-2 
                               focus:ring-indigo-500/40 focus:border-indigo-500/50 
                               focus:bg-indigo-50 transition-all shadow-inner" placeholder="ejemplo@correo.com">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[11px] font-bold text-neutral-400 uppercase tracking-widest">
                        Contraseña
                    </label>
                    <a href="#" class="text-[11px] font-bold text-indigo-400 hover:text-indigo-300 transition-colors">
                        ¿Problemas de acceso?
                    </a>
                </div>
                <div class="relative group">
                    <input type="password" class="w-full bg-indigo-50 border border-white/10 rounded-xl px-4 py-3.5 text-black 
                               placeholder:text-white/30 focus:outline-none focus:ring-2 
                               focus:ring-indigo-500/40 focus:border-indigo-500/50 
                               focus:bg-indigo-50 transition-all shadow-inner" placeholder="••••••••••••">
                </div>
            </div>

            <label class="group/cb flex items-center cursor-pointer select-none gap-2">
                <input type="checkbox" class="sr-only">
            
                <div class="h-5 w-5 rounded-md border border-black bg-white/10
                            group-has-checked/cb:bg-indigo-600 
                            group-has-checked/cb:border-indigo-500
                            flex items-center justify-center transition-all duration-200">
            
                    <svg class="w-3.5 h-3.5 text-white scale-0 opacity-0
                                group-has-checked/cb:scale-100 
                                group-has-checked/cb:opacity-100
                                transition-all duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            
                <span class="text-xs text-neutral-400 transition-colors">
                    Mantener sesión activa
                </span>
            </label>

            <button type="submit" class="relative w-full overflow-hidden group bg-indigo-600 hover:bg-indigo-500 
                       text-white font-extrabold py-4 rounded-xl shadow-xl 
                       shadow-indigo-900/40 transition-all duration-300 active:scale-95">
                <span class="relative z-10 uppercase tracking-widest text-sm">Entrar al Servidor</span>
                <div class="absolute inset-0 bg-linear-to-r from-transparent via-white/20 to-transparent 
                            -translate-x-full group-hover:translate-x-full transition-transform duration-700">
                </div>
            </button>
        </form>

        <footer class="mt-10 text-center">
            <p class="text-neutral-500 text-xs">
                ¿No tienes una cuenta?
                <a href="#" class="text-[11px] font-bold text-indigo-400 hover:text-indigo-300 transition-colors">Únete
                    a la legión</a>
            </p>

            <div class="mt-8 flex justify-center gap-6 opacity-30 grayscale hover:opacity-100 transition-opacity">
                <span class="text-[10px] text-neutral-400 flex items-center gap-1 uppercase tracking-tighter">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" />
                    </svg>
                    Encriptado SSL
                </span>
            </div>
        </footer>
    </div>
</div>
